version: "3.8"

services:
  redis:
    image: redis:latest
    container_name: ew-redis
    ports:
      - "6379:6379"
    networks:
      - ew-network

  db:
    image: mysql:8.0
    container_name: ew-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: earning_whisperer
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - ew-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ew-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - ew-network

networks:
  ew-network:
    driver: bridge

volumes:
  qdrant-storage:
