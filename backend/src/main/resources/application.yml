server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/earningwhisperer?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

ema:
  window-size: 10  # EMA 계산 윈도우 크기 (클수록 노이즈에 둔감)

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
