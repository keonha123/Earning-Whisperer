server:
  port: 8082

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  datasource:
    url: jdbc:mysql://localhost:3306/earningwhisperer?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  # 운영 환경에서는 반드시 환경변수로 주입. 최소 32자(256-bit) 이상.
  secret: ${JWT_SECRET:earning-whisperer-dev-secret-key-minimum-32-chars}
  expiration-ms: 900000  # 15분 (ms)
  refresh-expiration-seconds: 604800  # 7일 (s)
  cookie-secure: ${JWT_COOKIE_SECURE:false}  # 운영: true (HTTPS only)

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    allowed-redirect-uris: ${GOOGLE_REDIRECT_URIS:http://localhost:3000/auth/callback}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    allowed-redirect-uris: ${KAKAO_REDIRECT_URIS:http://localhost:3000/auth/callback}

finnhub:
  base-url: https://finnhub.io/api/v1
  api-key: ${FINNHUB_API_KEY:}   # 미설정 시 어닝 일정 스케줄러 비활성화

fmp:
  base-url: https://financialmodelingprep.com
  api-key: ${FMP_API_KEY:}       # 미설정 시 S&P 500 분기 동기화 스케줄러 비활성화

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
